name: lighthouse CI

on:
  push:
    branches: 
      -main

jobs:
  lhci:
    name: Lighthouse CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v3
        with:
        version: 9

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies 🏗️
        run: pnpm install

      - name: Build 🚀
        run: pnpm run build
        env:
          VITE_APP_BASE_URL: /

      - name: Collect
        run: lhci collect

      - name: Upload
        env:
          VITE_LIGHTHOUSE_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: lhci upload
