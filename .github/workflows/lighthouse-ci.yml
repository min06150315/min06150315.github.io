name: lighthouse CI

on:
  push:
    branches:
      - main

jobs:
  lhci:
    name: Lighthouse CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v3
        with:
          version: 9 # ✅

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies 🏗️
        run: pnpm install

      - name: Build 🚀
        run: pnpm run build
        env:
          VITE_APP_BASE_URL: /

      - name: List files in dist 📁
        run: ls -R ./dist

      - name: Run Lighthouse CI 📊
        run: |
          npm install -g @lhci/cli@0.13.x
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
